<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Backtester</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f1117; color: #e8e8e8; font-family: 'Segoe UI', sans-serif; }
        
        h1 { color: #ffffff; }
        
        /* Cards */
        .card { background-color: #1a1d2e; border: 1px solid #2e3250; border-radius: 12px; }
        
        /* Form inputs */
        .form-control, .form-select { 
            background-color: #252840; 
            color: #ffffff; 
            border: 1px solid #3a3f6b;
            border-radius: 8px;
        }
        .form-control:focus, .form-select:focus { 
            background-color: #252840; 
            color: #ffffff; 
            border-color: #4a9eff; 
            box-shadow: 0 0 0 2px rgba(74,158,255,0.2); 
        }
        .form-control::placeholder { color: #888; }
        .form-label { color: #b0b8d0; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.3px; }
        
        /* Run button */
        .btn-primary { 
            background-color: #4a9eff; 
            border: none; 
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: background-color 0.2s;
        }
        .btn-primary:hover { background-color: #3a8ef0; }

        /* Metric cards */
        .metric-card { 
            border-left: 4px solid #4a9eff; 
            border-radius: 12px;
        }
        .metric-label { color: #8892b0; font-size: 0.78rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
        .metric-value { font-size: 1.7rem; font-weight: 700; color: #ffffff; }
        .positive { color: #00e676; }
        .negative { color: #ff5252; }

        /* Chart card */
        #chart_container h5 { color: #ffffff; font-weight: 600; }

        /* Trade log */
        #trades_container h5 { color: #ffffff; font-weight: 600; }
        .table { color: #e0e0e0; }
        .table thead tr { background-color: #252840; color: #8892b0; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.8px; }
        .table-striped > tbody > tr:nth-of-type(odd) { background-color: #1f2235; }
        .table-striped > tbody > tr:nth-of-type(even) { background-color: #1a1d2e; }
        .table td { border-color: #2e3250; vertical-align: middle; }
    </style>
</head>
<body>
<div class="container-fluid py-4 px-4">
    <h1 class="mb-4 fw-bold">📈 Algorithmic Trading Backtester</h1>

    <!-- Input Form -->
    <div class="card p-4 mb-4">
        <div class="row g-3">
            <div class="col-md-2">
                <label class="form-label">Ticker</label>
                <input type="text" id="ticker" class="form-control" value="AAPL" placeholder="e.g. AAPL">
            </div>
            <div class="col-md-2">
                <label class="form-label">Start Date</label>
                <input type="date" id="start_date" class="form-control" value="2020-01-01">
            </div>
            <div class="col-md-2">
                <label class="form-label">End Date</label>
                <input type="date" id="end_date" class="form-control" value="2023-01-01">
            </div>
            <div class="col-md-2">
                <label class="form-label">Strategy</label>
                <select id="strategy" class="form-select">
                    <option value="sma_crossover">SMA Crossover</option>
                    <option value="rsi">RSI</option>
                    <option value="bollinger_bands">Bollinger Bands</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Starting Capital ($)</label>
                <input type="number" id="capital" class="form-control" value="10000">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-primary w-100" onclick="runBacktest()">Run Backtest</button>
            </div>
        </div>
    </div>

    <!-- Metrics -->
    <div id="metrics" style="display:none">
        <div class="row g-3 mb-2">
            <div class="col-12">
                <div class="card p-3">
                    <div class="row text-center">
                        <div class="col-2"></div>
                        <div class="col-5" style="color: #4a9eff; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.8px;">Strategy</div>
                        <div class="col-5" style="color: #00e676; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.8px;">Buy & Hold</div>
                    </div>
                    <div class="row text-center align-items-center py-2" style="border-top: 1px solid #2e3250; margin-top: 8px;">
                        <div class="col-2 text-start" style="color: #8892b0; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.8px;">Total Return</div>
                        <div class="col-5"><span class="metric-value" id="total_return">--</span></div>
                        <div class="col-5"><span class="metric-value" id="bh_total_return">--</span></div>
                    </div>
                    <div class="row text-center align-items-center py-2" style="border-top: 1px solid #2e3250;">
                        <div class="col-2 text-start" style="color: #8892b0; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.8px;">Annualized Return</div>
                        <div class="col-5"><span class="metric-value" id="annualized_return">--</span></div>
                        <div class="col-5"><span class="metric-value" id="bh_annualized_return">--</span></div>
                    </div>
                    <div class="row text-center align-items-center py-2" style="border-top: 1px solid #2e3250;">
                        <div class="col-2 text-start" style="color: #8892b0; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.8px;">Sharpe Ratio</div>
                        <div class="col-5"><span class="metric-value" id="sharpe_ratio">--</span></div>
                        <div class="col-5"><span class="metric-value" id="bh_sharpe_ratio">--</span></div>
                    </div>
                    <div class="row text-center align-items-center py-2" style="border-top: 1px solid #2e3250;">
                        <div class="col-2 text-start" style="color: #8892b0; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.8px;">Max Drawdown</div>
                        <div class="col-5"><span class="metric-value" id="max_drawdown">--</span></div>
                        <div class="col-5"><span class="metric-value" id="bh_max_drawdown">--</span></div>
                    </div>
                    <div class="row text-center align-items-center py-2" style="border-top: 1px solid #2e3250;">
                        <div class="col-2 text-start" style="color: #8892b0; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.8px;">Final Value</div>
                        <div class="col-5"><span class="metric-value" id="final_value">--</span></div>
                        <div class="col-5"><span class="metric-value" id="bh_final_value">--</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chart -->
    <div class="card p-4 mb-4" id="chart_container" style="display:none">
        <h5 class="mb-3">Portfolio Value Over Time</h5>
        <canvas id="portfolioChart" height="80"></canvas>
    </div>

    <!-- Trade Log -->
    <div class="card p-4" id="trades_container" style="display:none">
        <h5 class="mb-3">Trade Log</h5>
        <div class="table-responsive">
            <table class="table table-dark table-striped">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Action</th>
                        <th>Price</th>
                        <th>Shares</th>
                    </tr>
                </thead>
                <tbody id="trade_log"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let portfolioChart = null;

async function runBacktest() {
    const ticker = document.getElementById('ticker').value;
    const start_date = document.getElementById('start_date').value;
    const end_date = document.getElementById('end_date').value;
    const strategy = document.getElementById('strategy').value;
    const capital = document.getElementById('capital').value;

    const btn = document.querySelector('button');
    btn.textContent = 'Running...';
    btn.disabled = true;

    try {
        const response = await fetch('/run', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticker, start_date, end_date, strategy, starting_capital: capital })
        });

        const data = await response.json();

        if (data.error) {
            alert('Error: ' + data.error);
            return;
        }

        displayMetrics(data.metrics, data.bh_metrics);
        displayChart(data.portfolio, data.buy_and_hold);
        displayTrades(data.trades);

    } catch (err) {
        alert('Something went wrong: ' + err.message);
    } finally {
        btn.textContent = 'Run Backtest';
        btn.disabled = false;
    }
}

function displayMetrics(metrics, bhMetrics) {
    document.getElementById('metrics').style.display = 'block';

    function setMetric(id, value, isPositiveGood = true) {
        const el = document.getElementById(id);
        el.textContent = typeof value === 'number' && id.includes('value') 
            ? '$' + value.toLocaleString()
            : value.toFixed(2) + (id.includes('value') ? '' : id.includes('sharpe') ? '' : '%');
        if (id.includes('value')) {
            el.textContent = '$' + value.toLocaleString();
            el.className = 'metric-value';
        } else if (id.includes('sharpe')) {
            el.textContent = value.toFixed(2);
            el.className = 'metric-value ' + (value >= 1 ? 'positive' : value >= 0 ? '' : 'negative');
        } else if (id.includes('drawdown')) {
            el.textContent = value.toFixed(2) + '%';
            el.className = 'metric-value negative';
        } else {
            el.textContent = value.toFixed(2) + '%';
            el.className = 'metric-value ' + (value >= 0 ? 'positive' : 'negative');
        }
    }

    setMetric('total_return', metrics.total_return);
    setMetric('annualized_return', metrics.annualized_return);
    setMetric('sharpe_ratio', metrics.sharpe_ratio);
    setMetric('max_drawdown', metrics.max_drawdown);
    setMetric('final_value', metrics.final_value);

    setMetric('bh_total_return', bhMetrics.total_return);
    setMetric('bh_annualized_return', bhMetrics.annualized_return);
    setMetric('bh_sharpe_ratio', bhMetrics.sharpe_ratio);
    setMetric('bh_max_drawdown', bhMetrics.max_drawdown);
    setMetric('bh_final_value', bhMetrics.final_value);
}

function displayChart(portfolio, buyAndHold) {
    document.getElementById('chart_container').style.display = 'block';

    const labels = portfolio.map(p => p.date);
    const values = portfolio.map(p => p.value);
    const bhValues = buyAndHold.map(p => p.value);

    if (portfolioChart) portfolioChart.destroy();

    const ctx = document.getElementById('portfolioChart').getContext('2d');
    portfolioChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: [
                {
                    label: 'Strategy',
                    data: values,
                    borderColor: '#4a9eff',
                    backgroundColor: 'rgba(74, 158, 255, 0.1)',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: true
                },
                {
                    label: 'Buy & Hold',
                    data: bhValues,
                    borderColor: '#00e676',
                    backgroundColor: 'rgba(0, 230, 118, 0.05)',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: true
                }
            ]
        },
        options: {
            responsive: true,
            plugins: { 
                legend: { 
                    display: true,
                    labels: { color: '#b0b8d0' }
                } 
            },
            scales: {
                x: { ticks: { color: '#888', maxTicksLimit: 12 }, grid: { color: '#2a2d3e' } },
                y: { ticks: { color: '#888', callback: v => '$' + v.toLocaleString() }, grid: { color: '#2a2d3e' } }
            }
        }
    });
}

function displayTrades(trades) {
    document.getElementById('trades_container').style.display = 'block';
    const tbody = document.getElementById('trade_log');
    tbody.innerHTML = '';

    if (trades.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No trades executed</td></tr>';
        return;
    }

    trades.forEach(trade => {
        const row = document.createElement('tr');
        const actionClass = trade.action === 'BUY' ? 'positive' : 'negative';
        row.innerHTML = `
            <td>${trade.date}</td>
            <td class="${actionClass}">${trade.action}</td>
            <td>$${parseFloat(trade.price).toFixed(2)}</td>
            <td>${parseFloat(trade.shares).toFixed(4)}</td>
        `;
        tbody.appendChild(row);
    });
}
</script>
</body>
</html>
