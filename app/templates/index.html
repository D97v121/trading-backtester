<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Backtester</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f1117; color: #e8e8e8; font-family: 'Segoe UI', sans-serif; }
        
        h1 { color: #ffffff; }
        
        /* Cards */
        .card { background-color: #1a1d2e; border: 1px solid #2e3250; border-radius: 12px; }
        
        /* Form inputs */
        .form-control, .form-select { 
            background-color: #252840; 
            color: #ffffff; 
            border: 1px solid #3a3f6b;
            border-radius: 8px;
        }
        .form-control:focus, .form-select:focus { 
            background-color: #252840; 
            color: #ffffff; 
            border-color: #4a9eff; 
            box-shadow: 0 0 0 2px rgba(74,158,255,0.2); 
        }
        .form-control::placeholder { color: #888; }
        .form-label { color: #b0b8d0; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.3px; }
        
        /* Run button */
        .btn-primary { 
            background-color: #4a9eff; 
            border: none; 
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: background-color 0.2s;
        }
        .btn-primary:hover { background-color: #3a8ef0; }

        /* Metric cards */
        .metric-card { 
            border-left: 4px solid #4a9eff; 
            border-radius: 12px;
        }
        .metric-label { color: #8892b0; font-size: 0.78rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
        .metric-value { font-size: 1.7rem; font-weight: 700; color: #ffffff; }
        .positive { color: #00e676; }
        .negative { color: #ff5252; }

        /* Chart card */
        #chart_container h5 { color: #ffffff; font-weight: 600; }

        /* Trade log */
        #trades_container h5 { color: #ffffff; font-weight: 600; }
        .table { color: #e0e0e0; }
        .table thead tr { background-color: #252840; color: #8892b0; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.8px; }
        .table-striped > tbody > tr:nth-of-type(odd) { background-color: #1f2235; }
        .table-striped > tbody > tr:nth-of-type(even) { background-color: #1a1d2e; }
        .table td { border-color: #2e3250; vertical-align: middle; }
    </style>
</head>
<body>
<div class="container-fluid py-4 px-4">
    <h1 class="mb-4 fw-bold">📈 Algorithmic Trading Backtester</h1>

    <!-- Input Form -->
    <div class="card p-4 mb-4">
        <div class="row g-3">
            <div class="col-md-2">
                <label class="form-label">Ticker</label>
                <input type="text" id="ticker" class="form-control" value="AAPL" placeholder="e.g. AAPL">
            </div>
            <div class="col-md-2">
                <label class="form-label">Start Date</label>
                <input type="date" id="start_date" class="form-control" value="2020-01-01">
            </div>
            <div class="col-md-2">
                <label class="form-label">End Date</label>
                <input type="date" id="end_date" class="form-control" value="2023-01-01">
            </div>
            <div class="col-md-2">
                <label class="form-label">Strategy</label>
                <select id="strategy" class="form-select">
                    <option value="sma_crossover">SMA Crossover</option>
                    <option value="rsi">RSI</option>
                    <option value="bollinger_bands">Bollinger Bands</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Starting Capital ($)</label>
                <input type="number" id="capital" class="form-control" value="10000">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-primary w-100" onclick="runBacktest()">Run Backtest</button>
            </div>
        </div>
    </div>

    <!-- Metrics -->
    <div class="row g-3 mb-4" id="metrics" style="display:none!important">
        <div class="col-md-2">
            <div class="card p-3 metric-card">
                <div class="metric-label">Total Return</div>
                <div class="metric-value" id="total_return">--</div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card p-3 metric-card">
                <div class="metric-label">Annualized Return</div>
                <div class="metric-value" id="annualized_return">--</div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card p-3 metric-card">
                <div class="metric-label">Sharpe Ratio</div>
                <div class="metric-value" id="sharpe_ratio">--</div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card p-3 metric-card">
                <div class="metric-label">Max Drawdown</div>
                <div class="metric-value" id="max_drawdown">--</div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card p-3 metric-card">
                <div class="metric-label">Final Value</div>
                <div class="metric-value" id="final_value">--</div>
            </div>
        </div>
    </div>

    <!-- Chart -->
    <div class="card p-4 mb-4" id="chart_container" style="display:none">
        <h5 class="mb-3">Portfolio Value Over Time</h5>
        <canvas id="portfolioChart" height="80"></canvas>
    </div>

    <!-- Trade Log -->
    <div class="card p-4" id="trades_container" style="display:none">
        <h5 class="mb-3">Trade Log</h5>
        <div class="table-responsive">
            <table class="table table-dark table-striped">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Action</th>
                        <th>Price</th>
                        <th>Shares</th>
                    </tr>
                </thead>
                <tbody id="trade_log"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let portfolioChart = null;

async function runBacktest() {
    const ticker = document.getElementById('ticker').value;
    const start_date = document.getElementById('start_date').value;
    const end_date = document.getElementById('end_date').value;
    const strategy = document.getElementById('strategy').value;
    const capital = document.getElementById('capital').value;

    const btn = document.querySelector('button');
    btn.textContent = 'Running...';
    btn.disabled = true;

    try {
        const response = await fetch('/run', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticker, start_date, end_date, strategy, starting_capital: capital })
        });

        const data = await response.json();

        if (data.error) {
            alert('Error: ' + data.error);
            return;
        }

        displayMetrics(data.metrics);
        displayChart(data.portfolio, data.buy_and_hold);
        displayTrades(data.trades);

    } catch (err) {
        alert('Something went wrong: ' + err.message);
    } finally {
        btn.textContent = 'Run Backtest';
        btn.disabled = false;
    }
}

function displayMetrics(metrics) {
    document.getElementById('metrics').style.display = 'flex';

    const totalReturn = metrics.total_return;
    const el = document.getElementById('total_return');
    el.textContent = totalReturn.toFixed(2) + '%';
    el.className = 'metric-value ' + (totalReturn >= 0 ? 'positive' : 'negative');

    const annReturn = metrics.annualized_return;
    const annEl = document.getElementById('annualized_return');
    annEl.textContent = annReturn.toFixed(2) + '%';
    annEl.className = 'metric-value ' + (annReturn >= 0 ? 'positive' : 'negative');

    const sharpe = metrics.sharpe_ratio;
    const sharpeEl = document.getElementById('sharpe_ratio');
    sharpeEl.textContent = sharpe.toFixed(2);
    sharpeEl.className = 'metric-value ' + (sharpe >= 1 ? 'positive' : sharpe >= 0 ? '' : 'negative');

    const drawdown = metrics.max_drawdown;
    const drawdownEl = document.getElementById('max_drawdown');
    drawdownEl.textContent = drawdown.toFixed(2) + '%';
    drawdownEl.className = 'metric-value negative';

    document.getElementById('final_value').textContent = '$' + metrics.final_value.toLocaleString();
}

function displayChart(portfolio, buyAndHold) {
    document.getElementById('chart_container').style.display = 'block';

    const labels = portfolio.map(p => p.date);
    const values = portfolio.map(p => p.value);
    const bhValues = buyAndHold.map(p => p.value);

    if (portfolioChart) portfolioChart.destroy();

    const ctx = document.getElementById('portfolioChart').getContext('2d');
    portfolioChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: [
                {
                    label: 'Strategy',
                    data: values,
                    borderColor: '#4a9eff',
                    backgroundColor: 'rgba(74, 158, 255, 0.1)',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: true
                },
                {
                    label: 'Buy & Hold',
                    data: bhValues,
                    borderColor: '#00e676',
                    backgroundColor: 'rgba(0, 230, 118, 0.05)',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: true
                }
            ]
        },
        options: {
            responsive: true,
            plugins: { 
                legend: { 
                    display: true,
                    labels: { color: '#b0b8d0' }
                } 
            },
            scales: {
                x: { ticks: { color: '#888', maxTicksLimit: 12 }, grid: { color: '#2a2d3e' } },
                y: { ticks: { color: '#888', callback: v => '$' + v.toLocaleString() }, grid: { color: '#2a2d3e' } }
            }
        }
    });
}

function displayTrades(trades) {
    document.getElementById('trades_container').style.display = 'block';
    const tbody = document.getElementById('trade_log');
    tbody.innerHTML = '';

    if (trades.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No trades executed</td></tr>';
        return;
    }

    trades.forEach(trade => {
        const row = document.createElement('tr');
        const actionClass = trade.action === 'BUY' ? 'positive' : 'negative';
        row.innerHTML = `
            <td>${trade.date}</td>
            <td class="${actionClass}">${trade.action}</td>
            <td>$${parseFloat(trade.price).toFixed(2)}</td>
            <td>${parseFloat(trade.shares).toFixed(4)}</td>
        `;
        tbody.appendChild(row);
    });
}
</script>
</body>
</html>
